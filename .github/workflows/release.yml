name: Release DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
            name: x86_64
          - arch: arm64
            runner: macos-14
            name: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Build DMG for ${{ matrix.name }}
        run: |
          set -euo pipefail

          chmod +x build.sh
          ./build.sh --arch "${{ matrix.arch }}"

          APP_NAME="DustWatch"
          VERSION="${{ github.ref_name }}"
          APP_DIR="build/$APP_NAME-${{ matrix.arch }}.app"
          DMG_PATH="build/$APP_NAME-${VERSION}-${{ matrix.name }}.dmg"

            hdiutil create \
            -volname "$APP_NAME ${VERSION} (${{ matrix.name }})" \
            -srcfolder "$APP_DIR" \
            -ov -format UDZO "$DMG_PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: "dmg-${{ matrix.name }}"
          path: build/DustWatch-${{ github.ref_name }}-${{ matrix.name }}.dmg
          if-no-files-found: error

  release:
    needs:
      - build
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DustWatch ${{ github.ref_name }} beta"
          prerelease: true
          files: artifacts/**/*.dmg
          generate_release_notes: true

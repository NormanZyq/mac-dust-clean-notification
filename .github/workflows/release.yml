name: Release DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
            name: x86_64
          - arch: arm64
            runner: macos-14
            name: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Build DMG for ${{ matrix.name }}
        run: |
          set -euo pipefail

          chmod +x build.sh
          ./build.sh --arch "${{ matrix.arch }}"

          APP_NAME="DustWatch"
          VERSION="${{ github.ref_name }}"
          APP_DIR="build/$APP_NAME.app"
          DMG_PATH="build/$APP_NAME-${VERSION}-${{ matrix.name }}.dmg"
          DMG_ROOT="build/dmg-root-${{ matrix.name }}"

          rm -rf "$DMG_ROOT"
          mkdir -p "$DMG_ROOT"
          ditto "$APP_DIR" "$DMG_ROOT/$APP_NAME.app"
          ln -s /Applications "$DMG_ROOT/Applications"

          hdiutil create \
            -volname "$APP_NAME ${VERSION} (${{ matrix.name }})" \
            -srcfolder "$DMG_ROOT" \
            -ov -format UDZO "$DMG_PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: "dmg-${{ matrix.name }}"
          path: build/DustWatch-${{ github.ref_name }}-${{ matrix.name }}.dmg
          if-no-files-found: error

  release:
    needs:
      - build
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Remove existing release for this tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GH_REPOSITORY"]
          tag = os.environ["GH_REF_NAME"]
          token = os.environ["GH_TOKEN"]
          base = f"https://api.github.com/repos/{repo}"

          def request(method, path):
              req = urllib.request.Request(
                  base + path,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  body = response.read()
              return json.loads(body.decode("utf-8")) if body else None

          releases = request("GET", "/releases?per_page=100") or []
          for release in releases:
              if release.get("tag_name") == tag:
                  release_id = release["id"]
                  print(f"Deleting existing release {release_id} for {tag}")
                  request("DELETE", f"/releases/{release_id}")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DustWatch ${{ github.ref_name }} beta"
          prerelease: true
          files: artifacts/**/*.dmg
          generate_release_notes: true
